<!DOCTYPE html>
<!--
  Airport Permits — v3.2 (security-hardened)
  Changes vs v3.1: PBKDF2-hashed passwords, no hardcoded creds, first-run admin bootstrap,
  idle/absolute session expiry, login rate-limiting, HMAC-signed QR payloads, hash-chained
  audit log, input validation, gregory calendar, crypto.randomUUID IDs, CSP+SRI, inline
  onclick replaced with delegated event handlers, logout clears session.

  RESIDUAL RISK (cannot be fixed in a single static file): all authorization runs in the
  client. A user with DevTools can still tamper with localStorage. For an airport-access
  permit system used in production, MOVE BUSINESS LOGIC TO A SERVER.
-->
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'none'; form-action 'none';" />
<meta http-equiv="X-Content-Type-Options" content="nosniff" />
<meta name="referrer" content="no-referrer" />
<title>مطارات الرياض — نظام تصاريح المطار v3.2</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
<script
  src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"
  integrity="sha384-3zSEDfvllQohrq0PHL1fOXJuC/jSOO34H46t6UQfobFOmxE5BpjjaIJY5F2/bMnU"
  crossorigin="anonymous"
  referrerpolicy="no-referrer"></script>
<style>
  :root {
    --navy: #0a2540;
    --navy-light: #14365e;
    --navy-soft: #1a4170;
    --gold: #c9a85c;
    --gold-soft: #e0c789;
    --gold-dark: #9b7e3e;
    --bg: #f6f4ee;
    --surface: #ffffff;
    --surface-alt: #faf8f3;
    --border: #e6e1d3;
    --border-strong: #c8c0a8;
    --text: #1a2332;
    --text-soft: #5a6478;
    --text-muted: #8a8f9c;
    --success: #2d7d4f;
    --success-bg: #e3f1e8;
    --warning: #b8651b;
    --warning-bg: #fbecd6;
    --danger: #b3261e;
    --danger-bg: #fbe5e3;
    --info: #1d4b8a;
    --info-bg: #e0ebf7;
    --purple: #6c3aa3;
    --purple-bg: #ede5f5;
    --shadow-sm: 0 1px 2px rgba(10, 37, 64, 0.06);
    --shadow-md: 0 4px 14px rgba(10, 37, 64, 0.08);
    --shadow-lg: 0 12px 32px rgba(10, 37, 64, 0.14);
    --radius: 10px;
    --radius-sm: 6px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    font-family: 'Noto Kufi Arabic', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.6;
    font-size: 14px;
  }

  body {
    background-image:
      radial-gradient(circle at 10% 0%, rgba(201, 168, 92, 0.06) 0%, transparent 40%),
      radial-gradient(circle at 90% 100%, rgba(10, 37, 64, 0.05) 0%, transparent 50%);
  }

  button { font-family: inherit; cursor: pointer; border: none; background: none; }
  input, select, textarea { font-family: inherit; font-size: inherit; color: inherit; }
  a { color: inherit; text-decoration: none; }

  /* ===== LOGIN ===== */
  .login-screen {
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 24px;
    background: linear-gradient(135deg, var(--navy) 0%, var(--navy-soft) 100%);
    position: relative;
    overflow: hidden;
  }
  .login-screen::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      radial-gradient(circle at 20% 30%, rgba(201, 168, 92, 0.18) 0%, transparent 35%),
      radial-gradient(circle at 80% 70%, rgba(201, 168, 92, 0.12) 0%, transparent 40%);
    pointer-events: none;
  }
  .login-card {
    background: var(--surface);
    width: 100%;
    max-width: 440px;
    border-radius: 16px;
    padding: 44px 36px 36px;
    box-shadow: 0 30px 80px rgba(0,0,0,0.4);
    position: relative;
    z-index: 1;
  }
  .login-brand {
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 14px;
    margin-bottom: 32px;
    text-align: center;
  }
  .login-logo {
    width: 64px; height: 64px;
    background: var(--navy);
    border-radius: 18px;
    display: grid;
    place-items: center;
    color: var(--gold);
    box-shadow: 0 8px 24px rgba(10,37,64,0.3);
  }
  .login-title {
    font-size: 20px;
    font-weight: 700;
    color: var(--navy);
    margin-top: 4px;
  }
  .login-subtitle {
    font-size: 12px;
    color: var(--text-muted);
    letter-spacing: 0.3px;
  }
  .login-version {
    display: inline-block;
    background: var(--gold);
    color: var(--navy);
    font-size: 10px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 999px;
    letter-spacing: 0.5px;
    margin-top: 6px;
  }

  .field { margin-bottom: 16px; }
  .field label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-soft);
    margin-bottom: 6px;
  }
  .field input, .field select, .field textarea {
    width: 100%;
    padding: 11px 14px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--surface);
    transition: border-color .15s, box-shadow .15s;
  }
  .field input:focus, .field select:focus, .field textarea:focus {
    outline: none;
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(201, 168, 92, 0.18);
  }
  .field textarea { resize: vertical; min-height: 80px; }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 10px 18px;
    border-radius: var(--radius-sm);
    font-weight: 600;
    font-size: 13px;
    transition: all .15s;
    border: 1.5px solid transparent;
  }
  .btn-primary { background: var(--navy); color: white; }
  .btn-primary:hover { background: var(--navy-soft); }
  .btn-gold { background: var(--gold); color: var(--navy); }
  .btn-gold:hover { background: var(--gold-soft); }
  .btn-success { background: var(--success); color: white; }
  .btn-success:hover { filter: brightness(1.08); }
  .btn-warning { background: var(--warning); color: white; }
  .btn-warning:hover { filter: brightness(1.08); }
  .btn-danger { background: var(--danger); color: white; }
  .btn-danger:hover { filter: brightness(1.08); }
  .btn-outline { background: transparent; color: var(--navy); border-color: var(--border-strong); }
  .btn-outline:hover { background: var(--surface-alt); border-color: var(--navy); }
  .btn-ghost { background: transparent; color: var(--text-soft); }
  .btn-ghost:hover { background: var(--surface-alt); color: var(--text); }
  .btn-block { width: 100%; }
  .btn-sm { padding: 6px 12px; font-size: 12px; }
  .btn-lg { padding: 14px 22px; font-size: 14px; }

  .login-hint {
    margin-top: 24px;
    padding: 14px;
    background: var(--surface-alt);
    border-radius: var(--radius-sm);
    font-size: 11px;
    color: var(--text-muted);
    line-height: 1.7;
  }
  .login-hint strong { color: var(--navy); }
  .login-hint .creds {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4px 12px;
    margin-top: 8px;
    font-family: monospace;
    direction: ltr;
    text-align: right;
  }

  .login-error {
    background: var(--danger-bg);
    color: var(--danger);
    padding: 10px 14px;
    border-radius: var(--radius-sm);
    font-size: 12px;
    margin-bottom: 14px;
    border-right: 3px solid var(--danger);
  }

  /* ===== APP SHELL ===== */
  .app-shell { display: grid; grid-template-rows: auto 1fr; min-height: 100vh; }

  .topbar {
    background: var(--navy);
    color: white;
    padding: 12px 22px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: var(--shadow-md);
    position: sticky;
    top: 0;
    z-index: 50;
  }
  .topbar-brand {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .topbar-logo {
    width: 38px; height: 38px;
    background: var(--gold);
    border-radius: 10px;
    display: grid;
    place-items: center;
    color: var(--navy);
  }
  .topbar-title { font-size: 14px; font-weight: 700; }
  .topbar-subtitle { font-size: 10px; color: var(--gold-soft); margin-top: 1px; }

  .topbar-user {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .user-info { text-align: left; line-height: 1.3; }
  .user-name { font-size: 13px; font-weight: 600; }
  .user-role { font-size: 10px; color: var(--gold-soft); }
  .user-avatar {
    width: 36px; height: 36px;
    background: var(--gold);
    color: var(--navy);
    border-radius: 50%;
    display: grid;
    place-items: center;
    font-weight: 700;
    font-size: 14px;
  }

  .layout {
    display: grid;
    grid-template-columns: 240px 1fr;
    min-height: calc(100vh - 62px);
  }

  .sidebar {
    background: var(--surface);
    border-left: 1px solid var(--border);
    padding: 18px 12px;
  }
  .sidebar-section {
    font-size: 10px;
    font-weight: 700;
    color: var(--text-muted);
    letter-spacing: 0.6px;
    text-transform: uppercase;
    padding: 10px 12px 6px;
  }
  .sidebar-link {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 12px;
    border-radius: var(--radius-sm);
    color: var(--text-soft);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all .12s;
    margin-bottom: 2px;
    position: relative;
  }
  .sidebar-link:hover { background: var(--surface-alt); color: var(--navy); }
  .sidebar-link.active {
    background: var(--navy);
    color: white;
  }
  .sidebar-link.active .badge { background: var(--gold); color: var(--navy); }
  .sidebar-link .icon { font-size: 16px; line-height: 1; }
  .sidebar-link .badge {
    margin-right: auto;
    background: var(--surface-alt);
    color: var(--navy);
    font-size: 10px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 999px;
    min-width: 20px;
    text-align: center;
  }

  .main { padding: 24px 28px; overflow-x: auto; }

  .page-header {
    display: flex;
    align-items: end;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
    margin-bottom: 22px;
  }
  .page-title { font-size: 22px; font-weight: 700; color: var(--navy); }
  .page-subtitle { font-size: 13px; color: var(--text-muted); margin-top: 4px; }

  /* ===== STATS ===== */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 14px;
    margin-bottom: 24px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
    position: relative;
    overflow: hidden;
  }
  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 4px;
    height: 100%;
    background: var(--accent, var(--navy));
  }
  .stat-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    margin-bottom: 6px;
    letter-spacing: 0.3px;
  }
  .stat-value { font-size: 26px; font-weight: 700; color: var(--navy); line-height: 1; }
  .stat-meta { font-size: 11px; color: var(--text-soft); margin-top: 6px; }

  /* ===== TABS ===== */
  .tabs {
    display: flex;
    gap: 4px;
    border-bottom: 2px solid var(--border);
    margin-bottom: 20px;
    overflow-x: auto;
  }
  .tab {
    padding: 10px 18px;
    font-weight: 600;
    font-size: 13px;
    color: var(--text-muted);
    border-bottom: 2px solid transparent;
    margin-bottom: -2px;
    cursor: pointer;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all .12s;
  }
  .tab:hover { color: var(--navy); }
  .tab.active { color: var(--navy); border-bottom-color: var(--gold); }
  .tab .badge {
    background: var(--surface-alt);
    color: var(--text-soft);
    font-size: 10px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 999px;
    min-width: 20px;
    text-align: center;
  }
  .tab.active .badge { background: var(--gold); color: var(--navy); }

  /* ===== TABLE / LIST ===== */
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .panel-header {
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    background: var(--surface-alt);
    font-weight: 700;
    font-size: 13px;
    color: var(--navy);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  th {
    background: var(--surface-alt);
    text-align: right;
    padding: 12px 14px;
    font-weight: 700;
    color: var(--text-soft);
    font-size: 11px;
    letter-spacing: 0.3px;
    border-bottom: 1px solid var(--border);
  }
  td {
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--surface-alt); }

  .permit-id {
    font-family: 'Courier New', monospace;
    font-weight: 700;
    color: var(--navy);
    direction: ltr;
    display: inline-block;
  }

  /* ===== STATUS PILLS ===== */
  .pill {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 3px 10px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.2px;
    white-space: nowrap;
  }
  .pill::before {
    content: '';
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: currentColor;
  }
  .pill-yellow { background: var(--warning-bg); color: var(--warning); }
  .pill-green  { background: var(--success-bg); color: var(--success); }
  .pill-red    { background: var(--danger-bg); color: var(--danger); }
  .pill-purple { background: var(--purple-bg); color: var(--purple); }
  .pill-orange { background: var(--warning-bg); color: var(--warning); }
  .pill-blue   { background: var(--info-bg); color: var(--info); }
  .pill-gray   { background: var(--surface-alt); color: var(--text-muted); }

  .actions { display: flex; gap: 6px; flex-wrap: wrap; justify-content: flex-end; }
  .empty {
    padding: 60px 20px;
    text-align: center;
    color: var(--text-muted);
  }
  .empty .empty-icon {
    font-size: 42px;
    margin-bottom: 10px;
    opacity: 0.4;
  }
  .empty .empty-title { font-weight: 600; color: var(--text-soft); margin-bottom: 4px; }

  /* ===== MODAL ===== */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(10, 37, 64, 0.55);
    backdrop-filter: blur(4px);
    display: grid;
    place-items: center;
    z-index: 100;
    padding: 20px;
    animation: fadeIn .15s;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .modal {
    background: var(--surface);
    border-radius: 14px;
    width: 100%;
    max-width: 560px;
    max-height: calc(100vh - 40px);
    overflow-y: auto;
    box-shadow: 0 24px 64px rgba(0,0,0,0.3);
  }
  .modal-lg { max-width: 800px; }
  .modal-header {
    padding: 18px 22px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .modal-title { font-size: 16px; font-weight: 700; color: var(--navy); }
  .modal-close {
    color: var(--text-muted);
    font-size: 22px;
    line-height: 1;
    width: 32px;
    height: 32px;
    border-radius: var(--radius-sm);
  }
  .modal-close:hover { background: var(--surface-alt); color: var(--navy); }
  .modal-body { padding: 22px; }
  .modal-footer {
    padding: 14px 22px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    background: var(--surface-alt);
  }

  /* ===== TOAST ===== */
  .toasts {
    position: fixed;
    bottom: 20px;
    left: 20px;
    z-index: 200;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .toast {
    background: white;
    border: 1px solid var(--border);
    border-right: 4px solid var(--accent, var(--navy));
    border-radius: var(--radius-sm);
    padding: 12px 18px;
    box-shadow: var(--shadow-lg);
    min-width: 280px;
    font-size: 13px;
    font-weight: 500;
    animation: slideIn .2s;
  }
  .toast-success { --accent: var(--success); }
  .toast-error { --accent: var(--danger); }
  .toast-warning { --accent: var(--warning); }
  .toast-info { --accent: var(--info); }
  @keyframes slideIn { from { transform: translateX(-30px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

  /* ===== ROUNDS ===== */
  .round-card {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 14px;
    overflow: hidden;
  }
  .round-header {
    padding: 12px 16px;
    background: var(--surface-alt);
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }
  .round-title { font-weight: 700; color: var(--navy); font-size: 13px; }
  .round-meta { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .round-body { padding: 14px 16px; }
  .approval-step {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px dashed var(--border);
  }
  .approval-step:last-child { border-bottom: none; }
  .approval-icon {
    width: 32px; height: 32px;
    border-radius: 50%;
    display: grid;
    place-items: center;
    flex-shrink: 0;
    font-size: 14px;
  }
  .approval-info { flex: 1; min-width: 0; }
  .approval-action { font-weight: 600; font-size: 13px; }
  .approval-meta { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .approval-comment {
    margin-top: 6px;
    padding: 8px 10px;
    background: var(--surface-alt);
    border-radius: var(--radius-sm);
    font-size: 12px;
    color: var(--text-soft);
    border-right: 2px solid var(--border-strong);
  }

  /* ===== KEY-VALUE GRID ===== */
  .kv-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 14px;
    margin-bottom: 18px;
  }
  .kv {
    background: var(--surface-alt);
    padding: 10px 14px;
    border-radius: var(--radius-sm);
    border-right: 3px solid var(--gold);
  }
  .kv-label { font-size: 10px; color: var(--text-muted); font-weight: 600; letter-spacing: 0.3px; }
  .kv-value { font-size: 13px; color: var(--text); font-weight: 600; margin-top: 2px; }

  .section-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--navy);
    margin: 18px 0 10px;
    padding-bottom: 6px;
    border-bottom: 2px solid var(--gold);
    display: inline-block;
  }

  .filter-row {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
    flex-wrap: wrap;
    align-items: center;
  }
  .filter-row input, .filter-row select {
    padding: 8px 12px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--surface);
    font-size: 12px;
    min-width: 160px;
  }
  .filter-row input:focus, .filter-row select:focus {
    outline: none;
    border-color: var(--gold);
  }

  /* ===== QR CODE ===== */
  .qr-container {
    background: white;
    padding: 18px;
    border-radius: var(--radius);
    border: 2px solid var(--gold);
    display: inline-block;
    margin: 0 auto;
  }

  /* WhatsApp Log */
  .wa-message {
    background: #d4f5d8;
    padding: 10px 14px;
    border-radius: 10px 10px 10px 4px;
    margin-bottom: 8px;
    font-size: 12px;
    border-right: 3px solid #2d7d4f;
    max-width: 540px;
  }
  .wa-meta { font-size: 10px; color: var(--text-muted); margin-top: 4px; }

  /* Print */
  @media print {
    body * { visibility: hidden; }
    #print-area, #print-area * { visibility: visible; }
    #print-area {
      position: absolute;
      left: 0; top: 0;
      width: 100%;
      padding: 30px;
    }
    .no-print { display: none !important; }
  }

  .print-permit {
    background: white;
    padding: 32px;
    position: relative;
    border: 2px solid var(--navy);
    border-radius: var(--radius);
  }

// ---------- AUTH ----------
// ============== SECURITY HELPERS (Web Crypto API) ==============
// PBKDF2-SHA-256, 200k iterations. Salt + hash both base64-encoded.
async function hashPassword(password, saltB64) {
  const enc = new TextEncoder();
  const salt = saltB64 ? Uint8Array.from(atob(saltB64), c => c.charCodeAt(0))
                       : crypto.getRandomValues(new Uint8Array(16));
  const key = await crypto.subtle.importKey('raw', enc.encode(password), { name: 'PBKDF2' }, false, ['deriveBits']);
  const bits = await crypto.subtle.deriveBits(
    { name: 'PBKDF2', salt, iterations: 200000, hash: 'SHA-256' }, key, 256
  );
  const hash = btoa(String.fromCharCode(...new Uint8Array(bits)));
  return { salt: saltB64 || btoa(String.fromCharCode(...salt)), hash };
}
async function verifyPassword(password, saltB64, expectedHashB64) {
  const { hash } = await hashPassword(password, saltB64);
  if (hash.length !== expectedHashB64.length) return false;
  let diff = 0;
  for (let i = 0; i < hash.length; i++) diff |= hash.charCodeAt(i) ^ expectedHashB64.charCodeAt(i);
  return diff === 0;
}
async function getOrCreateQrSecret() {
  if (state.qrSecret) return state.qrSecret;
  const bytes = crypto.getRandomValues(new Uint8Array(32));
  state.qrSecret = btoa(String.fromCharCode(...bytes));
  saveState();
  return state.qrSecret;
}
async function hmacSign(message) {
  const secret = await getOrCreateQrSecret();
  const enc = new TextEncoder();
  const keyBytes = Uint8Array.from(atob(secret), c => c.charCodeAt(0));
  const key = await crypto.subtle.importKey('raw', keyBytes, { name: 'HMAC', hash: 'SHA-256' }, false, ['sign']);
  const sig = await crypto.subtle.sign('HMAC', key, enc.encode(message));
  return btoa(String.fromCharCode(...new Uint8Array(sig))).slice(0, 22);
}
async function sha256Hex(s) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(s));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('').slice(0, 32);
}
function newId(prefix) {
  return prefix + '-' + (crypto.randomUUID ? crypto.randomUUID() : Date.now() + '-' + Math.random().toString(36).slice(2, 10));
}

// ============== AUDIT CHAIN ==============
async function chainAppend(round, entry) {
  const prev = round.approvals.length ? round.approvals[round.approvals.length - 1] : null;
  entry.prevHash = prev ? prev.contentHash : 'GENESIS';
  const canon = JSON.stringify({
    stage: entry.stage, action: entry.action, by: entry.by, role: entry.role,
    comment: entry.comment, at: entry.at, prevHash: entry.prevHash
  });
  entry.contentHash = await sha256Hex(canon);
  round.approvals.push(entry);
}
async function verifyChain(permit) {
  if (!permit || !permit.rounds) return true;
  for (const r of permit.rounds) {
    let prev = 'GENESIS';
    for (const a of (r.approvals || [])) {
      if (a.prevHash !== prev) return false;
      const canon = JSON.stringify({
        stage: a.stage, action: a.action, by: a.by, role: a.role,
        comment: a.comment, at: a.at, prevHash: a.prevHash
      });
      const expected = await sha256Hex(canon);
      if (expected !== a.contentHash) return false;
      prev = a.contentHash;
    }
  }
  return true;
}

// ============== SESSION TIMEOUTS ==============
const IDLE_TIMEOUT_MS = 30 * 60 * 1000;
const ABSOLUTE_TIMEOUT_MS = 8 * 60 * 60 * 1000;
const LOGIN_LOCKOUT_MS = 15 * 60 * 1000;
const LOGIN_MAX_ATTEMPTS = 5;
function touchSession() {
  if (state.session) { state.session.lastActivity = Date.now(); saveState(); }
}
['click', 'keydown'].forEach(ev =>
  document.addEventListener(ev, () => { if (state.session) touchSession(); }, { passive: true })
);

// ============== AUTH ==============
async function login(username, password) {
  const now = Date.now();
  const fail = state.failedLogins[username] || { count: 0, lockedUntil: 0 };
  if (fail.lockedUntil && now < fail.lockedUntil) {
    const remain = Math.ceil((fail.lockedUntil - now) / 60000);
    return { ok: false, error: `تم قفل الحساب مؤقتاً. حاول بعد ${remain} دقيقة` };
  }
  const u = state.users.find(x => x.username === username && x.active);
  let ok = false;
  if (u && u.passwordHash && u.passwordSalt) {
    try { ok = await verifyPassword(password, u.passwordSalt, u.passwordHash); } catch (_) {}
  }
  if (!ok) {
    fail.count = (fail.count || 0) + 1;
    if (fail.count >= LOGIN_MAX_ATTEMPTS) {
      fail.lockedUntil = now + LOGIN_LOCKOUT_MS;
      fail.count = 0;
    }
    state.failedLogins[username] = fail;
    saveState();
    return { ok: false, error: 'بيانات الدخول غير صحيحة' };
  }
  delete state.failedLogins[username];
  state.session = { userId: u.id, at: now, lastActivity: now };
  saveState();
  return { ok: true };
}
function logout() { state.session = null; state.view = 'home'; saveState(); render(); }
function currentUser() {
  if (!state.session) return null;
  const now = Date.now();
  const idle = now - (state.session.lastActivity || state.session.at);
  const absolute = now - state.session.at;
  if (idle > IDLE_TIMEOUT_MS || absolute > ABSOLUTE_TIMEOUT_MS) {
    state.session = null; saveState(); return null;
  }
  return state.users.find(u => u.id === state.session.userId) || null;
}

// ---------- PERMISSIONS (per v3.1 spec) ----------
function canApprove(user, permit) {
  if (!user || !permit) return false;
  if (permit.status === 'pending_approval_1' && user.role === 'customs') return true;
  if (permit.status === 'pending_approval_2' && user.role === 'security') return true;
  if (permit.status === 'pending_approval_3' && user.role === 'gaca') return true;
  return false;
}
function canReturn(user, permit) {
  return canApprove(user, permit); // same gating as approve, per v3.1
}
function canReject(user, permit) {
  if (!user || !permit) return false;
  if (user.role !== 'admin') return false; // ★ v3.1: admin only
  return ['pending_approval_1','pending_approval_2','pending_approval_3','pending_payment','returned'].includes(permit.status);
}
function canCancel(user, permit) {
  if (!user || !permit) return false;
  if (user.role !== 'admin') return false;
  return ['pending_approval_1','pending_approval_2','pending_approval_3','pending_payment','returned'].includes(permit.status);
}
function canConfirmPayment(user, permit) {
  return user && user.role === 'operator' && permit && permit.status === 'pending_payment';
}
function canResubmit(user, permit) {
  return user && permit && permit.status === 'returned' && permit.createdBy === user.id;
}

// ---------- VISIBILITY HELPERS ----------
function getDeptForRole(role) {
  if (role === 'customs') return { stage: 1, statusKey: 'pending_approval_1', label: 'الجمارك' };
  if (role === 'security') return { stage: 2, statusKey: 'pending_approval_2', label: 'الأمن العام' };
  if (role === 'gaca') return { stage: 3, statusKey: 'pending_approval_3', label: 'هيئة الطيران المدني' };
  return null;
}
function permitsInMyStage(user) {
  const dept = getDeptForRole(user.role);
  if (!dept) return [];
  return state.permits.filter(p => p.status === dept.statusKey);
}
function myApprovedPermits(user) {
  if (!user) return [];
  return state.permits.filter(p =>
    Array.isArray(p.rounds) && p.rounds.some(r =>
      Array.isArray(r.approvals) && r.approvals.some(a => a.by === user.id && a.action === 'approved')
    )
  );
}
function myReturnedPermits(user) {
  if (!user) return [];
  return state.permits.filter(p =>
    Array.isArray(p.rounds) && p.rounds.some(r =>
      Array.isArray(r.approvals) && r.approvals.some(a => a.by === user.id && a.action === 'returned')
    )
  );
}
function findUserApprovalOn(permit, userId, action) {
  if (!permit || !permit.rounds) return null;
  for (let i = permit.rounds.length - 1; i >= 0; i--) {
    const r = permit.rounds[i];
    if (!r.approvals) continue;
    for (let j = r.approvals.length - 1; j >= 0; j--) {
      const a = r.approvals[j];
      if (a.by === userId && (!action || a.action === action)) return { approval: a, roundNumber: r.roundNumber };
    }
  }
  return null;
}

// ---------- ACTIONS ----------
function nextPermitId() {
  let max = 10000;
  for (const p of state.permits) {
    const n = parseInt((p.id || '').replace('PRM-', ''), 10);
    if (!isNaN(n) && n > max) max = n;
  }
  return 'PRM-' + (max + 1);
}

function ensureCurrentRound(permit) {
  if (!Array.isArray(permit.rounds)) permit.rounds = [];
  if (!permit.rounds.length) {
    permit.rounds.push({
      roundNumber: 1, startedAt: Date.now(), endedAt: null,
      status: 'in_progress', resubmittedFromRound: null, approvals: []
    });
  }
  const last = permit.rounds[permit.rounds.length - 1];
  if (!Array.isArray(last.approvals)) last.approvals = [];
  return last;
}

function createPermit(formData, byUser) {
  const id = nextPermitId();
  const now = Date.now();
  const permit = {
    id,
    applicantName: formData.applicantName,
    applicantId: formData.applicantId,
    applicantPhone: formData.applicantPhone,

    direction: formData.direction,
    airport: formData.airport,
    duration: parseInt(formData.duration, 10) || 7,
    status: 'pending_approval_1',
    currentStage: 1,
    rounds: [{
      roundNumber: 1, startedAt: now, endedAt: null,
      status: 'in_progress', resubmittedFromRound: null, approvals: []
    }],
    createdBy: byUser.id,
    createdByName: byUser.fullName,
    createdAt: now
  };
  state.permits.unshift(permit);
  saveState();
  return permit;
}

async function approvePermit(permitId, comment) {
  try {
    const user = currentUser();
    const permit = state.permits.find(p => p.id === permitId);
    if (!permit) return toast('error', 'الطلب غير موجود');
    if (!canApprove(user, permit)) return toast('error', 'لا تملك صلاحية الموافقة على هذا الطلب');

    const round = ensureCurrentRound(permit);
    const dept = getDeptForRole(user.role);
    await chainAppend(round, {
      stage: dept.stage,
      stageName: dept.label,
      action: 'approved',
      by: user.id,
      byName: user.fullName,
      role: user.role,
      comment: (comment || '').slice(0, 500),
      at: Date.now()
    });

    // advance stage
    if (permit.status === 'pending_approval_1') {
      permit.status = 'pending_approval_2';
      permit.currentStage = 2;
    } else if (permit.status === 'pending_approval_2') {
      permit.status = 'pending_approval_3';
      permit.currentStage = 3;
    } else if (permit.status === 'pending_approval_3') {
      permit.status = 'pending_payment';
      permit.currentStage = null;
      // generate WhatsApp payment link msg
      logWhatsApp({
        permitId: permit.id,
        type: 'payment_link',
        message: `مرحباً ${permit.applicantName}،\nطلب التصريح ${permit.id} اكتمل بالموافقات الثلاث.\nالرجاء إتمام الدفع عبر الرابط:\nhttps://pay.rac.sa/${permit.id}\nالمبلغ: 350 ر.س`
      });
    }
    saveState();
    closeModal();
    toast('success', 'تمت الموافقة بنجاح');
    render();
  } catch (e) {
    console.error('approvePermit failed:', e);
    toast('error', 'حدث خطأ أثناء الموافقة');
  }
}

async function returnPermit(permitId, comment) {
  try {
    const user = currentUser();
    const permit = state.permits.find(p => p.id === permitId);
    if (!permit) return toast('error', 'الطلب غير موجود');
    if (!canReturn(user, permit)) return toast('error', 'لا تملك صلاحية إعادة هذا الطلب');
    if (!comment || comment.trim().length < 5) return toast('error', 'سبب الإعادة إجباري (5 أحرف على الأقل)');

    const round = ensureCurrentRound(permit);
    const dept = getDeptForRole(user.role);
    const now = Date.now();
    await chainAppend(round, {
      stage: dept.stage,
      stageName: dept.label,
      action: 'returned',
      by: user.id,
      byName: user.fullName,
      role: user.role,
      comment: comment.trim().slice(0, 500),
      at: now
    });
    round.status = 'returned';
    round.endedAt = now;

    permit.status = 'returned';
    permit.currentStage = null;
    permit.lastReturnComment = comment.trim().slice(0, 500);
    permit.lastReturnBy = user.id;
    permit.lastReturnAt = now;

    saveState();
    closeModal();
    toast('warning', 'تمت إعادة الطلب للتصحيح');
    render();
  } catch (e) {
    console.error('returnPermit failed:', e);
    toast('error', 'حدث خطأ أثناء الإعادة');
  }
}

async function rejectPermit(permitId, comment) {
  try {
    const user = currentUser();
    const permit = state.permits.find(p => p.id === permitId);
    if (!permit) return toast('error', 'الطلب غير موجود');
    if (!canReject(user, permit)) return toast('error', 'الرفض صلاحية للمدير حصراً');
    if (!comment || comment.trim().length < 5) return toast('error', 'سبب الرفض إجباري (5 أحرف على الأقل)');

    const round = ensureCurrentRound(permit);
    const now = Date.now();
    await chainAppend(round, {
      stage: permit.currentStage || 0,
      stageName: 'إدارة',
      action: 'rejected',
      by: user.id,
      byName: user.fullName,
      role: 'admin',
      comment: comment.trim().slice(0, 500),
      at: now
    });
    round.status = 'rejected';
    round.endedAt = now;
    permit.status = 'rejected';
    permit.rejectedAt = now;
    permit.rejectedBy = user.id;
    permit.rejectedByName = user.fullName;
    permit.rejectionReason = comment.trim();

    logWhatsApp({
      permitId: permit.id, type: 'rejection_notice',
      message: `إشعار: تم رفض طلب التصريح ${permit.id} من قِبَل الإدارة.\nالسبب: ${comment.trim()}`
    });

    saveState();
    closeModal();
    toast('error', 'تم رفض الطلب نهائياً');
    render();
  } catch (e) {
    console.error('rejectPermit failed:', e);
    toast('error', 'حدث خطأ أثناء الرفض');
  }
}

async function cancelPermit(permitId, reason) {
  try {
    const user = currentUser();
    const permit = state.permits.find(p => p.id === permitId);
    if (!permit) return toast('error', 'الطلب غير موجود');
    if (!canCancel(user, permit)) return toast('error', 'الإلغاء الإداري صلاحية للمدير فقط');
    if (!reason || reason.trim().length < 5) return toast('error', 'سبب الإلغاء إجباري (5 أحرف على الأقل)');

    const round = ensureCurrentRound(permit);
    const now = Date.now();
    await chainAppend(round, {
      stage: permit.currentStage || 0,
      stageName: 'إدارة',
      action: 'cancelled',
      by: user.id,
      byName: user.fullName,
      role: 'admin',
      comment: reason.trim().slice(0, 500),
      at: now
    });
    round.status = 'cancelled';
    round.endedAt = now;
    permit.previousStatus = permit.status;
    permit.status = 'cancelled';
    permit.cancelledAt = now;
    permit.cancelledBy = user.id;
    permit.cancelReason = reason.trim();

    logWhatsApp({
      permitId: permit.id, type: 'cancellation_notice',
      message: `إشعار: تم إلغاء طلب التصريح ${permit.id} إدارياً.\nالسبب: ${reason.trim()}`
    });

    saveState();
    closeModal();
    toast('warning', 'تم إلغاء الطلب إدارياً');
    render();
  } catch (e) {
    console.error('cancelPermit failed:', e);
    toast('error', 'حدث خطأ أثناء الإلغاء');
  }
}

async function resubmitPermit(permitId, updates) {
  try {
    const user = currentUser();
    const permit = state.permits.find(p => p.id === permitId);
    if (!permit) return toast('error', 'الطلب غير موجود');
    if (!canResubmit(user, permit)) return toast('error', 'لا يمكنك إعادة تقديم هذا الطلب');

    // apply updates
    Object.assign(permit, updates);
    const prevRoundNum = (permit.rounds[permit.rounds.length - 1] || {}).roundNumber || 1;
    permit.rounds.push({
      roundNumber: prevRoundNum + 1,
      startedAt: Date.now(),
      endedAt: null,
      status: 'in_progress',
      resubmittedFromRound: prevRoundNum,
      approvals: []
    });
    permit.status = 'pending_approval_1';
    permit.currentStage = 1;
    permit.lastResubmittedAt = Date.now();

    saveState();
    closeModal();
    toast('success', 'تم تعديل الطلب وإعادة تقديمه');
    render();
  } catch (e) {
    console.error('resubmitPermit failed:', e);
    toast('error', 'حدث خطأ أثناء إعادة التقديم');
  }
}

async function confirmPayment(permitId) {
  try {
    const user = currentUser();
    const permit = state.permits.find(p => p.id === permitId);
    if (!permit) return toast('error', 'الطلب غير موجود');
    if (!canConfirmPayment(user, permit)) return toast('error', 'لا تملك صلاحية تأكيد الدفع');

    const now = Date.now();
    permit.status = 'active';
    permit.paymentAmount = 350;
    permit.paymentDate = now;
    permit.paymentConfirmedBy = user.id;
    permit.expiryDate = now + permit.duration * 86400000;

    round.endedAt = now;
    round.status = 'completed';

    logWhatsApp({
      permitId: permit.id, type: 'qr_image',

    });
    logWhatsApp({
      permitId: permit.id, type: 'finance_receipt',
      message: `إشعار للإدارة المالية: تم استلام دفعة بقيمة 350 ر.س لتصريح ${permit.id}`
    });

    saveState();
    closeModal();
    toast('success', 'تم تأكيد الدفع وإصدار التصريح');
    render();
  } catch (e) {
    console.error('confirmPayment failed:', e);
    toast('error', 'حدث خطأ أثناء تأكيد الدفع');
  }
}

async function createUser(data) {
  if (!/^[a-zA-Z0-9_.-]{3,32}$/.test(data.username || '')) { toast('error', 'اسم المستخدم: 3-32 حرف، حروف/أرقام'); return false; }
  if (!data.password || data.password.length < 8 || data.password.length > 128) { toast('error', 'كلمة المرور 8-128 حرف'); return false; }
  if (!/[A-Za-z]/.test(data.password) || !/[0-9]/.test(data.password)) { toast('error', 'كلمة المرور يجب أن تحتوي حروف وأرقام'); return false; }
  if (!data.fullName || data.fullName.length < 2 || data.fullName.length > 80) { toast('error', 'الاسم الكامل غير صالح'); return false; }
  const allowedRoles = ['user','operator','customs','security','gaca','admin'];
  if (!allowedRoles.includes(data.role)) { toast('error', 'صلاحية غير صالحة'); return false; }
  if (data.role === 'admin') {
    const u = currentUser();
    const isFirstRun = state.users.length === 0;
    if (!isFirstRun && (!u || u.role !== 'admin')) { toast('error', 'إنشاء المدير صلاحية للمدير الحالي فقط'); return false; }
  }
  if (state.users.find(u => u.username === data.username)) { toast('error', 'اسم المستخدم موجود'); return false; }
  const { salt, hash } = await hashPassword(data.password);
  state.users.push({
    id: newId('u'),
    username: data.username,
    passwordHash: hash,
    passwordSalt: salt,
    fullName: data.fullName,
    role: data.role,
    active: true,
    createdAt: Date.now()
  });
  saveState(); render(); toast('success', 'تم إنشاء المستخدم');
  return true;
}
function toggleUserActive(userId) {
  const u = state.users.find(x => x.id === userId);
  if (!u) return;
  if (u.id === 'u-admin') return toast('error', 'لا يمكن تعطيل المدير الرئيسي');
  u.active = !u.active;
  saveState(); render();
}

// ---------- UTILS ----------
function formatDate(ts) {
  if (!ts) return '-';
  const d = new Date(ts);
  return d.toLocaleDateString('ar-SA-u-ca-gregory', { year: 'numeric', month: 'short', day: 'numeric' });
}
function formatDateTime(ts) {
  if (!ts) return '-';
  const d = new Date(ts);
  return d.toLocaleString('ar-SA-u-ca-gregory', { dateStyle: 'short', timeStyle: 'short' });
}
function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
}
function getStatusInfo(permit) {
  const s = permit.status;
  if (s === 'active' && permit.expiryDate) {
    const days = Math.ceil((permit.expiryDate - Date.now()) / 86400000);
    if (days < 0) return STATUS_LABELS.expired;
    if (days <= 7) return STATUS_LABELS.expiring;
  }
  return STATUS_LABELS[s] || { txt: s, cls: 'pill-gray' };
}
function statusPill(permit) {
  const info = getStatusInfo(permit);
  return `<span class="pill ${info.cls}">${escapeHtml(info.txt)}</span>`;
}

// ---------- TOAST ----------
function toast(type, msg, duration) {
  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  el.textContent = msg;
  document.getElementById('toasts').appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; el.style.transition = 'opacity .2s'; }, duration || 3500);
  setTimeout(() => el.remove(), (duration || 3500) + 300);
}

function showModal(html) {

function countByStatus(list) {
  const c = { pending: 0, payment: 0, active: 0, returned: 0, rejected: 0, cancelled: 0 };
  for (const p of list) {
    if (['pending_approval_1','pending_approval_2','pending_approval_3'].includes(p.status)) c.pending++;
    else if (p.status === 'pending_payment') c.payment++;
    else if (p.status === 'active') c.active++;
    else if (p.status === 'returned') c.returned++;
    else if (p.status === 'rejected') c.rejected++;
    else if (p.status === 'cancelled') c.cancelled++;
  }
  return c;
}

function renderApprovalHistoryTable(list, user, action) {
  if (!list.length) {
    return `<div class="empty"><div class="empty-icon">${action === 'approved' ? '📭' : '📂'}</div>
      <div class="empty-title">لا يوجد سجل بعد</div>
      <div>الطلبات التي ${action === 'approved' ? 'توافق' : 'تعيد'} عليها ستظهر هنا</div></div>`;
  }
  // For each permit, find ALL approvals (not just last) by this user with the given action
  const rows = [];
  for (const p of list) {
    for (const r of (p.rounds || [])) {
      for (const a of (r.approvals || [])) {
        if (a.by === user.id && a.action === action) {
          rows.push({ permit: p, approval: a, roundNumber: r.roundNumber });
        }
      }
    }
  }
  rows.sort((a, b) => b.approval.at - a.approval.at);
  return `
    <table>
      <thead>
        <tr>
          <th>رقم الطلب</th>
          <th>مقدم الطلب</th>
          <th>المادة</th>
          <th>تاريخ ${action === 'approved' ? 'الموافقة' : 'الإعادة'}</th>
          <th>الجولة</th>
          <th>الحالة الحالية للطلب</th>
          ${action === 'returned' ? '<th>سبب الإعادة</th>' : ''}
          <th></th>
        </tr>
      </thead>
      <tbody>
      ${rows.map(row => `
        <tr>
          <td><span class="permit-id">${escapeHtml(row.permit.id)}</span></td>
          <td>${escapeHtml(row.permit.applicantName)}</td>
          <td>${escapeHtml(row.permit.materialType)}</td>
          <td class="small text-muted">${formatDateTime(row.approval.at)}</td>
          <td><span class="pill pill-blue">جولة ${row.roundNumber}</span></td>
          <td>${statusPill(row.permit)}</td>
          ${action === 'returned' ? `<td class="small text-muted" style="max-width:240px">${escapeHtml(row.approval.comment || '-')}</td>` : ''}
          <td class="actions"><button class="btn btn-outline btn-sm" data-action="showPermitDetails" data-arg="${row.permit.id}">عرض</button></td>
        </tr>`).join('')}
      </tbody>
    </table>`;
}

          <th></th>
        </tr>
      </thead>
      <tbody>
      ${list.map(p => `
        <tr>
          <td><span class="permit-id">${escapeHtml(p.id)}</span></td>
          ${showApplicant ? `<td>${escapeHtml(p.applicantName)}</td>` : ''}
          <td>${escapeHtml(p.materialType)}</td>
          <td><span class="pill ${p.direction==='entry'?'pill-blue':'pill-purple'}">${p.direction==='entry'?'دخول':'خروج'}</span></td>
          <td>${statusPill(p)}</td>
          <td>${stageProgress(p)}</td>
          <td class="small text-muted">${formatDate(p.createdAt)}</td>
          <td class="actions">${rowActions(p, opts.context)}</td>
        </tr>`).join('')}
      </tbody>
    </table>`;
}

function stageProgress(p) {
  const reached = (n) => {
    if (p.status === 'pending_approval_1') return n < 1;
    if (p.status === 'pending_approval_2') return n < 2;
    if (p.status === 'pending_approval_3') return n < 3;
    if (['pending_payment','active','expired','expiring'].includes(p.status)) return n < 3;
    return false;
  };
  const isCurrent = (n) => {
    if (p.status === 'pending_approval_1' && n === 1) return true;
    if (p.status === 'pending_approval_2' && n === 2) return true;
    if (p.status === 'pending_approval_3' && n === 3) return true;
    return false;
  };
  return `<div class="stage-progress" title="مراحل الموافقة">
    ${[1,2,3].map(n => `<div class="stage-pip ${reached(n)?'done':''} ${isCurrent(n)?'current':''}"></div>`).join('')}
  </div>`;
}

function rowActions(p, ctx) {
  const u = currentUser();
  const view = `<button class="btn btn-outline btn-sm" data-action="showPermitDetails" data-arg="${p.id}">عرض</button>`;
  const acts = [];
  if (canApprove(u, p)) {
    acts.push(`<button class="btn btn-success btn-sm" data-action="showApproveModal" data-arg="${p.id}">✅ موافقة</button>`);
    acts.push(`<button class="btn btn-warning btn-sm" data-action="showReturnModal" data-arg="${p.id}">↩️ إعادة</button>`);
  }
  if (canConfirmPayment(u, p)) acts.push(`<button class="btn btn-success btn-sm" data-action="showPaymentModal" data-arg="${p.id}">💳 تأكيد الدفع</button>`);
  if (canResubmit(u, p)) acts.push(`<button class="btn btn-primary btn-sm" data-action="showResubmitModal" data-arg="${p.id}">🔄 تعديل وإعادة</button>`);
  if (u.role === 'admin') {
    if (canReject(u, p)) acts.push(`<button class="btn btn-danger btn-sm" data-action="showRejectModal" data-arg="${p.id}">✖️ رفض</button>`);
    if (canCancel(u, p)) acts.push(`<button class="btn btn-outline btn-sm" data-action="showCancelModal" data-arg="${p.id}">🚫 إلغاء</button>`);
  }
  return view + acts.join('');
}

      </div>
      <div class="modal-body">
        <div class="section-title">بيانات مقدم الطلب</div>
        <div class="kv-grid">
          <div class="kv"><div class="kv-label">الاسم</div><div class="kv-value">${escapeHtml(p.applicantName)}</div></div>
          <div class="kv"><div class="kv-label">الهوية</div><div class="kv-value">${escapeHtml(p.applicantId)}</div></div>
          <div class="kv"><div class="kv-label">الجوال</div><div class="kv-value" style="direction:ltr">${escapeHtml(p.applicantPhone)}</div></div>
          <div class="kv"><div class="kv-label">الشركة</div><div class="kv-value">${escapeHtml(p.company)}</div></div>
        </div>
        <div class="section-title">تفاصيل المواد والتصريح</div>
        <div class="kv-grid">
          <div class="kv"><div class="kv-label">نوع المادة</div><div class="kv-value">${escapeHtml(p.materialType)}</div></div>
          <div class="kv"><div class="kv-label">الكمية</div><div class="kv-value">${escapeHtml(p.quantity)}</div></div>
          <div class="kv"><div class="kv-label">الاتجاه</div><div class="kv-value">${p.direction==='entry'?'دخول':'خروج'}</div></div>
          <div class="kv"><div class="kv-label">المطار</div><div class="kv-value">${escapeHtml(p.airport)}</div></div>
          <div class="kv"><div class="kv-label">المدة</div><div class="kv-value">${p.duration} يوم</div></div>
          ${p.expiryDate ? `<div class="kv"><div class="kv-label">تنتهي في</div><div class="kv-value">${formatDate(p.expiryDate)}</div></div>` : ''}
        </div>
        <div class="kv" style="grid-column:span 2"><div class="kv-label">الوصف</div><div class="kv-value" style="font-weight:400">${escapeHtml(p.materialDescription)}</div></div>

function renderRound(round, permit, seeInternalNames) {
  const statusMap = {
    in_progress: { txt: 'قيد المعالجة', cls: 'pill-yellow' },
    completed: { txt: 'مكتملة', cls: 'pill-green' },
    returned: { txt: 'معادة للتصحيح', cls: 'pill-orange' },
    rejected: { txt: 'مرفوضة', cls: 'pill-red' },
    cancelled: { txt: 'ملغاة', cls: 'pill-red' }
  };
  const sInfo = statusMap[round.status] || statusMap.in_progress;
  return `
    <div class="round-card">
      <div class="round-header">
        <div>
          <div class="round-title">جولة رقم ${round.roundNumber} ${round.resubmittedFromRound ? `<span class="small text-muted">(إعادة تقديم من جولة ${round.resubmittedFromRound})</span>` : ''}</div>
          <div class="round-meta">بدأت: ${formatDateTime(round.startedAt)} ${round.endedAt ? '• انتهت: ' + formatDateTime(round.endedAt) : ''}</div>
        </div>
        <span class="pill ${sInfo.cls}">${sInfo.txt}</span>
      </div>
      <div class="round-body">
        ${(round.approvals||[]).length === 0 ? '<div class="text-muted small">لم تُسجَّل إجراءات في هذه الجولة بعد</div>' : ''}
        ${(round.approvals||[]).map(a => {
          const map = {
            approved: { icon: '✓', bg: 'var(--success-bg)', color: 'var(--success)', label: 'موافقة' },
            returned: { icon: '↩', bg: 'var(--warning-bg)', color: 'var(--warning)', label: 'إعادة للتصحيح' },
            rejected: { icon: '✕', bg: 'var(--danger-bg)', color: 'var(--danger)', label: 'رفض' },
            cancelled: { icon: '🚫', bg: 'var(--danger-bg)', color: 'var(--danger)', label: 'إلغاء إداري' }
          };
          const m = map[a.action] || map.approved;
          return `
            <div class="approval-step">
              <div class="approval-icon" style="background:${m.bg};color:${m.color}">${m.icon}</div>
              <div class="approval-info">
                <div class="approval-action" style="color:${m.color}">${m.label} — ${escapeHtml(a.stageName)}</div>
                <div class="approval-meta">
                  ${seeInternalNames ? `${escapeHtml(a.byName)} <span class="text-muted">(${ROLE_LABELS[a.role]||a.role})</span> • ` : ''}
                  ${formatDateTime(a.at)}
                </div>
                ${a.comment ? `<div class="approval-comment">${escapeHtml(a.comment)}</div>` : ''}
              </div>
            </div>`;
        }).join('')}
      </div>
    </div>`;
}

    <div class="print-permit">
      <div class="print-header">
        <div>
          <div style="font-size:22px;font-weight:800;color:var(--navy)">مطارات الرياض</div>

        </div>

          <div style="font-size:18px;font-weight:700;color:var(--navy)">تصريح دخول مواد</div>
          <div class="permit-id" style="font-size:14px">${escapeHtml(p.id)}</div>
        </div>
      </div>
      <div class="kv-grid">

        <div class="kv"><div class="kv-label">الشركة</div><div class="kv-value">${escapeHtml(p.company)}</div></div>
        <div class="kv"><div class="kv-label">المادة</div><div class="kv-value">${escapeHtml(p.materialType)}</div></div>
        <div class="kv"><div class="kv-label">الاتجاه</div><div class="kv-value">${p.direction==='entry'?'دخول':'خروج'}</div></div>
        <div class="kv"><div class="kv-label">المطار</div><div class="kv-value">${escapeHtml(p.airport)}</div></div>

      </div>
      <div id="print-qr" style="text-align:center;margin:20px 0"></div>
      <div style="font-size:11px;color:var(--text-muted);text-align:center;margin-top:14px">

      </div>

  setTimeout(async () => {

        });

    }
    window.print();
    printArea.style.display = 'none';
  }, 200);
}

// ============== EVENT DELEGATION (CSP-safe; replaces inline onclick) ==============
document.addEventListener('click', async function(ev) {
  let el = ev.target;
  while (el && el !== document) {
    if (el.dataset && el.dataset.action) break;
    el = el.parentNode;
  }
  if (!el || !el.dataset || !el.dataset.action) return;
  const action = el.dataset.action;
  const arg = el.dataset.arg;
  const from = el.dataset.from;
  const fromVal = from ? ((document.getElementById(from) || {}).value || '') : undefined;
  try {
    if (action === 'closeModalBackdrop') { if (ev.target === el) closeModal(); return; }
    if (action === 'closeModal')           { closeModal(); return; }
    if (action === 'logout')               { logout(); return; }
    if (action === 'rerenderAll')          { rerenderAll(); return; }
    if (action === 'setView')              { setView(arg); return; }
    if (action === 'showCreateUserModal')  { showCreateUserModal(); return; }
    if (action === 'showPermitDetails')    { showPermitDetails(arg); return; }
    if (action === 'toggleUserActive')     { toggleUserActive(arg); return; }
    if (action === 'showApproveModal')     { showApproveModal(arg); return; }
    if (action === 'showReturnModal')      { showReturnModal(arg); return; }
    if (action === 'showRejectModal')      { showRejectModal(arg); return; }
    if (action === 'showCancelModal')      { showCancelModal(arg); return; }
    if (action === 'showPaymentModal')     { showPaymentModal(arg); return; }
    if (action === 'showResubmitModal')    { showResubmitModal(arg); return; }
    if (action === 'printPermit')          { await printPermit(arg); return; }
    if (action === 'submitCreateUser')     { await submitCreateUser(); return; }
    if (action === 'submitResubmit')       { submitResubmit(arg); return; }
    if (action === 'approvePermit')        { await approvePermit(arg, fromVal); return; }
    if (action === 'returnPermit')         { await returnPermit(arg, fromVal); return; }
    if (action === 'rejectPermit')         { await rejectPermit(arg, fromVal); return; }
    if (action === 'cancelPermit')         { await cancelPermit(arg, fromVal); return; }
    if (action === 'confirmPayment')       { await confirmPayment(arg); return; }
  } catch (e) {
    console.error('action failed:', action, e);
    toast('error', 'تعذّر تنفيذ الإجراء');
  }
}, false);
document.addEventListener('input', function(ev) {
  if (ev.target && ev.target.dataset && ev.target.dataset.action === 'searchInput') {
    state.filter.search = ev.target.value; rerenderAll();
  }
});
document.addEventListener('change', function(ev) {
  if (ev.target && ev.target.dataset && ev.target.dataset.action === 'filterStatus') {
    state.filter.status = ev.target.value; rerenderAll();
  }
});

loadState();
render();
